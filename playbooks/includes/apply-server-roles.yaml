---
# Gemeinsame Rollen-Anwendung für alle Setup-Playbooks
# Erwartet Variablen: docker, backrest, tailscale, newt, server_name
- name: Set up base system
  include_role:
    name: base-system

- name: Configure security settings
  include_role:
    name: security
  vars:
    disable_ssh_for_tailscale: "{{ tailscale | bool }}"

- name: Configure shell
  include_role:
    name: shell-config

- name: Set up monitoring tools
  include_role:
    name: monitoring-tools

- name: Set up backup tools
  include_role:
    name: backup-tools
  vars:
    install_backrest: "{{ backrest | bool }}"
    backrest_server_name: "{{ server_name }}"
    install_docker: "{{ docker | bool }}"
  when: backrest | bool

- name: Set up container tools
  include_role:
    name: container-tools
  vars:
    install_docker: "{{ docker | bool }}"
  when: docker | bool

- name: Set up Newt with Pangolin API integration
  include_role:
    name: pangolin-newt
  vars:
    install_newt: "{{ newt | bool }}"
    pangolin_api_token: "{{ lookup('community.general.onepassword', 'Pangolin - Weinheim', field='Anmeldedaten', vault='CI') }}"
    pangolin_api_endpoint: "{{ lookup('community.general.onepassword', 'Pangolin - Weinheim', field='Host-Name', vault='CI') }}"
    pangolin_organization_id: "{{ lookup('community.general.onepassword', 'Pangolin - Weinheim', field='Organisation', vault='CI') }}"
    site_name: "{{ server_name }}"
  when: newt | bool
