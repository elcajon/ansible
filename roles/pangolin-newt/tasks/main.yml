---
# tasks file for pangolin-newt

# Pangolin API Integration für automatische Site-Erstellung
- name: Include Pangolin API Integration tasks
  ansible.builtin.import_tasks: pangolin_api.yml
  when: install_newt | default(False)

- name: Update/Installations-Skript für Newt kopieren
  ansible.builtin.template:
    src: newt_update.j2
    dest: /etc/cron.daily/newt_update
    owner: root
    group: root
    mode: "0755"
  when: install_newt | default(False)

- name: Initialer Download der Newt-Binary
  ansible.builtin.command: /etc/cron.daily/newt_update
  args:
    creates: /usr/local/bin/newt
  when: install_newt | default(False)

- name: Newt-Konfigurationsverzeichnis anlegen
  ansible.builtin.file:
    path: /etc/newt
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: install_newt | default(False)

- name: Newt-Zugangsdaten aus der Site-Erstellung übernehmen
  ansible.builtin.set_fact:
    newt_endpoint: "https://{{ site_defaults.data.endpoint }}"
    newt_id: "{{ site_defaults.data.newtId }}"
    newt_secret: "{{ site_defaults.data.newtSecret }}"
  no_log: true
  when: install_newt | default(False)

- name: Newt-Umgebungsdatei mit Zugangsdaten erzeugen
  # Nur für root lesbar; die Service-Unit selbst enthält keine Secrets mehr.
  ansible.builtin.template:
    src: newt.env.j2
    dest: /etc/newt/newt.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify:
    - Enable and start newt
  when: install_newt | default(False)

- name: Newt Systemd Service aus Template erzeugen
  ansible.builtin.template:
    src: newt.service.j2
    dest: /etc/systemd/system/newt.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Enable and start newt
  when: install_newt | default(False)
