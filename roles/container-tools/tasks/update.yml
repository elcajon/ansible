---
# Update-Tasks für ctop
# Prüft ob ctop installiert ist und aktualisiert bei Bedarf

- name: Prüfe ob ctop installiert ist
  ansible.builtin.stat:
    path: /usr/local/bin/ctop
  register: ctop_binary

- name: Installierte ctop-Version ermitteln
  ansible.builtin.shell: |
    set -o pipefail
    ctop -v 2>&1 | grep -oP '[0-9]+\.[0-9]+\.[0-9]+'
  args:
    executable: /bin/bash
  register: ctop_installed_version
  changed_when: false
  failed_when: false
  when: ctop_binary.stat.exists

# Redirect von /releases/latest statt der API nutzen: kein Rate-Limit,
# und "latest" enthält nie Prereleases oder Drafts
- name: Neueste ctop-Version von GitHub ermitteln
  ansible.builtin.uri:
    url: https://github.com/bcicen/ctop/releases/latest
    follow_redirects: none
    status_code: 302
  register: ctop_latest_release
  when: ctop_binary.stat.exists

# Redirect-Ziel ist .../releases/tag/v0.7.7 → basename liefert den Tag mit v-Präfix
- name: Neuesten ctop-Tag bestimmen
  ansible.builtin.set_fact:
    ctop_latest_tag: "{{ ctop_latest_release.location | basename }}"
  when: ctop_binary.stat.exists

- name: Host Architektur für ctop bestimmen
  ansible.builtin.set_fact:
    ctop_arch: >-
      {{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
  when: ctop_binary.stat.exists

- name: Ctop aktualisieren
  # SHA256-Prüfung gegen die von ctop veröffentlichte sha256sums.txt
  ansible.builtin.get_url:
    url: "https://github.com/bcicen/ctop/releases/download/{{ ctop_latest_tag }}/ctop-{{
      ctop_latest_tag | regex_replace('^v', '') }}-linux-{{ ctop_arch }}"
    dest: /usr/local/bin/ctop
    mode: "0755"
    force: true
    checksum: "sha256:https://github.com/bcicen/ctop/releases/download/{{ ctop_latest_tag }}/sha256sums.txt"
  when:
    - ctop_binary.stat.exists
    - ctop_installed_version.stdout | default('') != (ctop_latest_tag | regex_replace('^v', ''))
